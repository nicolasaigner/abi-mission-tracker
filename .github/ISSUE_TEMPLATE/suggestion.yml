name: "💡 Sugestão"
description: Tem uma ideia para melhorar o tracker ou corrigir informação de missão?
title: "[Sugestão] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Sua sugestão é bem-vinda! Quanto mais detalhes, mais fácil de implementar.

  - type: dropdown
    id: temporada
    attributes:
      label: Qual temporada?
      options:
        - Temporada 4 – Caçada no Aeroporto
        - Temporada 5 – Vale Distorcido
        - Geral (todas as temporadas)
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Qual é a sua sugestão?
      placeholder: "Ex: O nome da missão nº 5 está errado, o correto é... / Seria legal ter um botão para compartilhar progresso."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Por que isso ajudaria?
      placeholder: "Ex: O nome correto aparece assim no jogo..."
